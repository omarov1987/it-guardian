<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IT Guardian Dashboard</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0f172a;
    color: white;
}

.container {
    padding: 20px;
}

h1 {
    display: flex;
    align-items: center;
    gap: 10px;
}

.cards {
    display: flex;
    gap: 20px;
    margin-bottom: 20px;
}

.stat {
    background: #1e293b;
    padding: 10px 20px;
    border-radius: 10px;
}

.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 15px;
    width: 300px;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
}

.online {
    border-left: 5px solid #22c55e;
}

.offline {
    border-left: 5px solid #ef4444;
}

.lowdisk {
    border-left: 5px solid #facc15;
}

.status {
    font-weight: bold;
}

</style>
</head>

<body>

<div class="container">

<h1>🛡️ IT Guardian Dashboard</h1>

<div class="cards">
    <div class="stat">Total: <span id="total">0</span></div>
    <div class="stat" style="color:#22c55e;">Online: <span id="online">0</span></div>
    <div class="stat" style="color:#ef4444;">Offline: <span id="offline">0</span></div>
    <div class="stat" style="color:#facc15;">Low Disk: <span id="lowdisk">0</span></div>
</div>

<div class="grid" id="devices"></div>

</div>

<script>

function timeAgo(date) {
    const seconds = Math.floor((new Date() - new Date(date)) / 1000);

    if (seconds < 60) return seconds + " sec ago";
    if (seconds < 3600) return Math.floor(seconds / 60) + " min ago";
    if (seconds < 86400) return Math.floor(seconds / 3600) + " h ago";

    return Math.floor(seconds / 86400) + " d ago";
}

async function loadDevices() {
    const res = await fetch("/devices");
    const data = await res.json();

    let online = 0;
    let offline = 0;
    let lowdisk = 0;

    const container = document.getElementById("devices");
    container.innerHTML = "";

    // sort online first
    data.sort((a,b) => new Date(b.last_seen) - new Date(a.last_seen));

    data.forEach(d => {

const lastSeen = new Date(d.last_seen + "Z");
const now = new Date();

const diffSeconds = (now.getTime() - lastSeen.getTime()) / 1000;
const minutes = diffSeconds / 60;

        let status = "ONLINE";
        let css = "online";

        if (minutes > 10) {
            status = "OFFLINE";
            css = "offline";
            offline++;
        } else {
            online++;
        }

        if (d.disk_free < 10 * 1024 * 1024 * 1024) {
            css = "lowdisk";
            lowdisk++;
        }

        const card = document.createElement("div");
        card.className = "card " + css;

        card.innerHTML = `
            <h3>💻 ${d.hostname}</h3>
            <p>OS: ${d.os}</p>
            <p>Disk: ${(d.disk_free / (1024*1024*1024)).toFixed(1)} GB free</p>
            <p class="status">Status: ${status}</p>
            <small>Last seen: ${timeAgo(d.last_seen)}</small>
        `;

        container.appendChild(card);
    });

    document.getElementById("total").innerText = data.length;
    document.getElementById("online").innerText = online;
    document.getElementById("offline").innerText = offline;
    document.getElementById("lowdisk").innerText = lowdisk;
}

// auto refresh every 5 sec
setInterval(loadDevices, 5000);

loadDevices();

</script>

</body>
</html>
