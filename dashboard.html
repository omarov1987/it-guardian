<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>IT Guardian Dashboard</title>

<style>
body {
    margin: 0;
    font-family: "Segoe UI", Arial;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: #e2e8f0;
}

.container {
    padding: 30px;
}

h1 {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 28px;
    margin-bottom: 25px;
}

.cards {
    display: flex;
    gap: 15px;
    margin-bottom: 30px;
    flex-wrap: wrap;
}

.stat {
    background: #1e293b;
    padding: 12px 22px;
    border-radius: 12px;
    font-weight: 500;
    box-shadow: 0 4px 15px rgba(0,0,0,0.4);
}

.grid {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 18px;
    width: 320px;
    transition: 0.3s;
    box-shadow: 0 8px 25px rgba(0,0,0,0.5);
}

.card:hover {
    transform: translateY(-5px);
}

.online {
    border-left: 5px solid #22c55e;
}

.offline {
    border-left: 5px solid #ef4444;
}

.lowdisk {
    border-left: 5px solid #facc15;
}

.status {
    font-weight: bold;
    margin-top: 10px;
}

.small {
    opacity: 0.7;
    font-size: 12px;
}
</style>
</head>

<body>

<div class="container">

<h1>🛡️ Omar Guardian Dashboard</h1>

<div class="cards">
    <div class="stat">Total: <span id="total">0</span></div>
    <div class="stat" style="color:#22c55e;">Online: <span id="online">0</span></div>
    <div class="stat" style="color:#ef4444;">Offline: <span id="offline">0</span></div>
    <div class="stat" style="color:#facc15;">Low Disk: <span id="lowdisk">0</span></div>
</div>

<div class="grid" id="devices"></div>

</div>

<script>

const token = "1";   

function timeAgo(date) {
    const now = new Date();
    const past = new Date(date + "Z");

    const seconds = Math.floor((now - past) / 1000);

    if (seconds < 60) return seconds + " sec ago";
    if (seconds < 3600) return Math.floor(seconds / 60) + " min ago";
    if (seconds < 86400) return Math.floor(seconds / 3600) + " h ago";

    return Math.floor(seconds / 86400) + " d ago";
}

async function loadDevices() {

    try {
        const res = await fetch(`/devices?token=${token}`);
        const data = await res.json();

        let online = 0;
        let offline = 0;
        let lowdisk = 0;

        const container = document.getElementById("devices");
        container.innerHTML = "";

        data.sort((a,b) => new Date(b.last_seen) - new Date(a.last_seen));

        data.forEach(d => {

            const lastSeen = new Date(d.last_seen + "Z");
            const now = new Date();
            const minutes = (now - lastSeen) / 60000;

            let status = "ONLINE";
            let css = "online";

            if (minutes > 10) {
                status = "OFFLINE";
                css = "offline";
                offline++;
            } else {
                online++;
            }

            if (d.disk_free < 10 * 1024 * 1024 * 1024) {
                css = "lowdisk";
                lowdisk++;
            }

            const card = document.createElement("div");
            card.className = "card " + css;

            card.innerHTML = `
                <h3>💻 ${d.hostname}</h3>
                <p>OS: ${d.os}</p>
                <p>Disk: ${(d.disk_free / (1024*1024*1024)).toFixed(1)} GB free</p>
                <p class="status">Status: ${status}</p>
                <div class="small">Last seen: ${timeAgo(d.last_seen)}</div>
            `;

            container.appendChild(card);
        });

        document.getElementById("total").innerText = data.length;
        document.getElementById("online").innerText = online;
        document.getElementById("offline").innerText = offline;
        document.getElementById("lowdisk").innerText = lowdisk;

    } catch (err) {
        console.error("Error loading devices", err);
    }
}

setInterval(loadDevices, 5000);
loadDevices();

</script>

</body>
</html>
